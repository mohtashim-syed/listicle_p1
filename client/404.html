<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Not Found</title>
    <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body>
    <header class="container">
      <nav>
        <ul>
          <li>
            <a href="/" class="brand"><strong>🛠️ Dev Tools &amp; Resources</strong></a>
          </li>
        </ul>
        <ul>
          <li><a href="/">Home</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <article class="not-found">
        <hgroup>
          <h1>404 — Page Not Found</h1>
          <p>We couldn't find that tool or page. It may have been moved or never existed.</p>
        </hgroup>
        <a href="/" role="button">Return Home</a>
      </article>
    </main>

    <footer class="container">
      <small>Built with Express &amp; Pico.css · Data served live from a Render PostgreSQL database.</small>
    </footer>
  </body>
</html>
